name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # Semantic Versioning & Release
  # ─────────────────────────────────────────────
  version:
    name: "Semantic Version & Tag"
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_major_version: ${{ steps.semantic.outputs.new_release_major_version }}
      new_release_minor_version: ${{ steps.semantic.outputs.new_release_minor_version }}
      new_release_patch_version: ${{ steps.semantic.outputs.new_release_patch_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/github
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version Info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "📦 New version: v${{ steps.semantic.outputs.new_release_version }}"
          echo "  Major: ${{ steps.semantic.outputs.new_release_major_version }}"
          echo "  Minor: ${{ steps.semantic.outputs.new_release_minor_version }}"
          echo "  Patch: ${{ steps.semantic.outputs.new_release_patch_version }}"

  # ─────────────────────────────────────────────
  # Build Release Artifacts (on new version)
  # ─────────────────────────────────────────────
  build-release:
    name: "Build ${{ matrix.os }}"
    needs: version
    if: needs.version.outputs.new_release_published == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmake-preset: ci-windows
            artifact-name: romulus-windows-x64
          - os: ubuntu-latest
            cmake-preset: ci-linux-gcc
            artifact-name: romulus-linux-x64

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup vcpkg cache
        run: mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        shell: bash

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-release-${{ matrix.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-release-${{ matrix.os }}-

      - name: Install GCC 13 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 130
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 130

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "c82f74667287d3dc386bce81e44964370c91a289"

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.cmake-preset }}
          -DPROJECT_VERSION="${{ needs.version.outputs.new_release_version }}"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build --config Release --output-on-failure --no-tests=error

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p staging
          cp build/Release/romulus.exe staging/ 2>/dev/null || cp build/apps/cli/Release/romulus_cli.exe staging/romulus.exe 2>/dev/null || true
          cp README.md CHANGELOG.md LICENSE staging/ 2>/dev/null || true
        shell: bash

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p staging
          cp build/romulus staging/ 2>/dev/null || cp build/apps/cli/romulus_cli staging/romulus 2>/dev/null || true
          cp README.md CHANGELOG.md LICENSE staging/ 2>/dev/null || true
          chmod +x staging/romulus 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: staging/
          retention-days: 90

      - name: Upload to Release
        if: needs.version.outputs.new_release_published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version.outputs.new_release_version }}"
          files: staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
